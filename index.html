<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>sugar</title>
<link rel="icon" type="image/png" href="https://sugar-osaka.github.io/sugar-calendar/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Yomogi&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fafaf8;min-height:100vh;padding:0 0 40px}
.wrap{max-width:480px;margin:0 auto;padding:1.5rem 1rem;font-family:'Yomogi',cursive}

/* ヘッダー */
.header{text-align:center;margin-bottom:1.8rem;padding-top:1rem}
.header img{width:160px;height:auto;display:block;margin:0 auto 8px}
.header p{font-size:18px;color:#a08070;font-family:'Caveat Brush',cursive;letter-spacing:0.02em}

/* バナーグリッド */
.banners{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}

/* 店舗バナー */
.banner{display:block;text-decoration:none;border-radius:12px;overflow:hidden;position:relative;aspect-ratio:3/4;border:1.5px solid #f0ebe8;transition:transform 0.2s ease,box-shadow 0.2s ease}
.banner:active{transform:scale(0.98)}
.banner-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.banner.sagisu .banner-placeholder{background:#F9EFF1}
.banner.ebie .banner-placeholder{background:#E8EFE3}
.banner.shop .banner-placeholder{background:#F5F0E8}
.banner-placeholder svg{width:40px;height:40px;opacity:0.25}
.banner-overlay{position:absolute;bottom:0;left:0;right:0;padding:28px 16px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.45))}
.banner-label{font-size:10px;letter-spacing:0.2em;opacity:0.85;margin-bottom:4px;font-family:'Yomogi',cursive;color:#fff}
.banner-name{font-family:'Caveat Brush',cursive;font-size:28px;color:#fff;line-height:1.1}
.banner-address{font-size:10px;margin-top:6px;opacity:0.75;line-height:1.6;color:#fff;font-family:'Yomogi',cursive}
.banner-arrow{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center}
.banner-arrow svg{width:14px;height:14px;stroke:#fff;fill:none}

/* 営業カレンダーバナー */
.cal-banner{display:flex;align-items:center;justify-content:space-between;text-decoration:none;border-radius:12px;padding:16px 20px;font-family:'Yomogi',cursive;background:#F9EFF1;transition:transform 0.2s ease}
.cal-banner:active{transform:scale(0.98)}
.cal-banner-left{display:flex;flex-direction:column;gap:2px}
.cal-banner-tag{font-size:10px;letter-spacing:0.2em;color:#c9909f;font-family:'Yomogi',cursive}
.cal-banner-title{font-family:'Caveat Brush',cursive;font-size:28px;color:#A63F52;line-height:1.1}
.cal-banner-sub{font-size:10px;color:#c9909f;font-family:'Yomogi',cursive;margin-top:1px}
.cal-banner-right{display:flex;align-items:center;gap:6px;background:#A63F52;color:#fff;font-family:'Yomogi',cursive;font-size:11px;padding:8px 14px;border-radius:20px;white-space:nowrap}
.cal-banner-right svg{width:12px;height:12px;stroke:#fff;fill:none;flex-shrink:0}

/* フッター */
footer{text-align:center;margin-top:2rem;font-size:11px;color:#ccc;font-family:'Yomogi',cursive;letter-spacing:0.1em}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <img src="https://sugar-osaka.github.io/sugar-calendar/logo.png" alt="sugar">
    <p>Un petit peu de bonheur.</p>
  </div>

  <!-- 3バナー -->
  <div class="banners">

    <a class="banner sagisu" href="https://sugar-osaka.github.io/sugar/sagisu/">
      <div class="banner-placeholder">
        <svg viewBox="0 0 48 48" fill="none" stroke="#A63F52" stroke-width="1.5"><rect x="8" y="16" width="32" height="24" rx="2"/><path d="M4 20 L24 8 L44 20"/><rect x="18" y="28" width="12" height="12"/></svg>
      </div>
      <div class="banner-overlay">
        <div class="banner-name">sagisu店</div>
        <div class="banner-address">福島区鷺洲1-11-3</div>
      </div>
      <div class="banner-arrow">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>

    <a class="banner ebie" href="https://sugar-osaka.github.io/sugar/ebie/">
      <div class="banner-placeholder">
        <svg viewBox="0 0 48 48" fill="none" stroke="#7A9A60" stroke-width="1.5"><rect x="8" y="16" width="32" height="24" rx="2"/><path d="M4 20 L24 8 L44 20"/><rect x="18" y="28" width="12" height="12"/></svg>
      </div>
      <div class="banner-overlay">
        <div class="banner-name">ebie店</div>
        <div class="banner-address">福島区海老江5-3-10</div>
      </div>
      <div class="banner-arrow">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>

    <a class="banner shop" href="https://sugargift.theshop.jp/" target="_blank" rel="noopener">
      <div class="banner-placeholder">
        <svg viewBox="0 0 48 48" fill="none" stroke="#C8956C" stroke-width="1.5"><path d="M6 18L3 10h42l-3 8"/><rect x="6" y="18" width="36" height="22" rx="2"/><path d="M18 18c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      </div>
      <div class="banner-overlay">
        <div class="banner-name" style="font-size:22px">-four sec-</div>
        <div class="banner-address">オンラインショップ</div>
      </div>
      <div class="banner-arrow">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>

  </div>

  <!-- 営業カレンダー -->
  <a class="cal-banner" href="https://sugar-osaka.github.io/sugar-calendar/">
    <div class="cal-banner-left">
      <div class="cal-banner-title">Calendar</div>
      <div class="cal-banner-sub">営業カレンダー</div>
    </div>
    <div class="cal-banner-right">
      CHECK
      <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
    </div>
  </a>

</div>

<footer>© sugar</footer>

</body>
</html>
