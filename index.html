<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>sugar</title>
<link rel="icon" type="image/png" href="https://sugar-osaka.github.io/sugar-calendar/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Yomogi&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fafaf8;min-height:100vh;padding:0 0 40px}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem;font-family:'Yomogi',cursive}

/* ヘッダー */
.header{text-align:center;margin-bottom:1.8rem;padding-top:1rem}
.header img{width:160px;height:auto;display:block;margin:0 auto 8px}
.header p{font-size:18px;color:#a08070;font-family:'Caveat Brush',cursive;letter-spacing:0.02em}

/* バナーグリッド */
.banners{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}

/* 店舗バナー */
.banner{display:block;text-decoration:none;border-radius:12px;overflow:hidden;position:relative;aspect-ratio:1/1;transition:transform 0.2s ease}
.banner:active{transform:scale(0.98)}
.banner-img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.banner-overlay{position:absolute;bottom:0;left:0;right:0;padding:28px 16px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.55))}
.banner-name{font-family:'Caveat Brush',cursive;font-size:26px;color:#fff;line-height:1.1}
.banner-name span{font-family:'Yomogi',cursive;font-size:20px}
.banner-address{font-size:10px;margin-top:6px;opacity:0.75;line-height:1.6;color:#fff;font-family:'Yomogi',cursive;text-shadow:0 0 0.5px #fff}
@media(max-width:600px){.banner-address{display:none}}
.banner-arrow{position:absolute;bottom:12px;right:12px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;z-index:2}
.banner-arrow svg{width:14px;height:14px;stroke:#fff;fill:none}

/* カレンダー＋UberEatsエリア */
.bottom-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;align-items:stretch}

.cal-banner-wrap{position:relative;display:flex;flex-direction:column}
.cal-banner-wrap::before{content:'';position:absolute;top:3px;left:3px;right:-3px;bottom:-3px;border-radius:12px;background:#A63F52;z-index:0}
.cal-banner{display:flex;flex-direction:column;justify-content:flex-start;text-decoration:none;border-radius:12px;padding:14px 16px;font-family:'Yomogi',cursive;background:#EEE8DF;transition:transform 0.2s ease;position:relative;z-index:1;flex:1}
.cal-banner:active{transform:scale(0.98)}
.cal-banner-title{font-family:'Caveat Brush',cursive;font-size:22px;color:#5C4A3A;line-height:1.1;text-shadow:0 0 0.3px currentColor}
.cal-banner-sub{font-size:10px;color:#9a8070;font-family:'Yomogi',cursive;margin-top:2px;text-shadow:0 0 0.4px currentColor}
.cal-banner-btn{display:inline-flex;align-items:center;gap:6px;background:#5C4A3A;color:#fff;font-family:'Yomogi',cursive;font-size:10px;padding:6px 12px;border-radius:20px;white-space:nowrap;width:fit-content;align-self:flex-end;margin-top:auto}
.cal-banner-btn svg{width:10px;height:10px;stroke:#fff;fill:none}

.uber-banner-wrap{position:relative;display:flex;flex-direction:column}
.uber-banner-wrap::before{content:'';position:absolute;top:3px;left:3px;right:-3px;bottom:-3px;border-radius:12px;background:#2E6040;z-index:0}
.uber-banner{display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-start;text-decoration:none;border-radius:12px;padding:14px 12px;background:#EEE8DF;border:none;transition:transform 0.2s ease;position:relative;z-index:1;flex:1}
.uber-banner:active{transform:scale(0.98)}
.uber-icon{font-size:13px;font-family:Arial,sans-serif;font-weight:900;color:#2E6040;line-height:1.2;letter-spacing:-0.3px;margin-bottom:8px}
.uber-banner-title{font-family:'Caveat Brush',cursive;font-size:18px;color:#5C4A3A;line-height:1.1;margin-bottom:4px;white-space:nowrap}
.uber-banner-label{font-size:9px;color:#9a8070;font-family:'Yomogi',cursive}

/* Yomogiを太く見せる */
.wrap *{-webkit-font-smoothing:antialiased}
.banner-address,.cal-banner-sub,.uber-banner-label{text-shadow:0 0 0.6px currentColor;-webkit-text-stroke:0.3px currentColor}
.cal-banner-sub,.uber-banner-label{-webkit-text-stroke:0.2px currentColor}
.banner-name span{text-shadow:0 0 0.8px #fff;-webkit-text-stroke:0.3px #fff}

/* PC表示時は大きいサイズに戻す */
@media(min-width:601px){
  .banner-name{font-size:28px}
  .banner-name span{font-size:22px}
  .cal-banner-title{font-size:28px}
  .cal-banner{padding:18px 20px}
  .uber-banner-title{font-size:28px}
  .uber-banner{padding:18px 16px}
}
footer{text-align:center;margin-top:2rem;font-size:11px;color:#ccc;font-family:'Yomogi',cursive;letter-spacing:0.1em}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <img src="https://sugar-osaka.github.io/sugar-calendar/logo.png" alt="sugar">
    <p>Un petit peu de bonheur.</p>
  </div>

  <!-- 3バナー -->
  <div class="banners">

    <a class="banner sagisu" href="https://sugar-osaka.github.io/sugar/sagisu/">
      <img class="banner-img" src="sagisu.jpg" alt="sagisu店">
      <div class="banner-overlay">
        <div class="banner-name">sagisu<span>店</span></div>
        <div class="banner-address">福島区鷺洲1-11-3</div>
      </div>
      <div class="banner-arrow">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>

    <a class="banner ebie" href="https://sugar-osaka.github.io/sugar/ebie/">
      <img class="banner-img" src="ebie.jpg" alt="ebie店">
      <div class="banner-overlay">
        <div class="banner-name">ebie<span>店</span></div>
        <div class="banner-address">福島区海老江5-3-10</div>
      </div>
      <div class="banner-arrow">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>

    <a class="banner shop" href="https://sugargift.theshop.jp/" target="_blank" rel="noopener">
      <img class="banner-img" src="four_sec.jpg" alt="-four sec-">
      <div class="banner-overlay">
        <div class="banner-name">-four sec-</div>
        <div class="banner-address">オンラインショップ</div>
      </div>
      <div class="banner-arrow">
        <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>

  </div>

  <!-- カレンダー＋UberEats -->
  <div class="bottom-grid">

    <div class="cal-banner-wrap">
      <a class="cal-banner" href="https://sugar-osaka.github.io/sugar-calendar/">
        <div>
          <div class="cal-banner-title">Calendar</div>
          <div class="cal-banner-sub">営業カレンダー</div>
        </div>
        <div class="cal-banner-btn">
          CHECK
          <svg viewBox="0 0 16 16" stroke-width="1.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </div>
      </a>
    </div>

    <div class="uber-banner-wrap">
      <a class="uber-banner" href="https://www.ubereats.com/store-browse-uuid/a9e7abd2-8722-5720-b635-0ced9a2e3a95?diningMode=DELIVERY" target="_blank" rel="noopener">
        <div class="uber-icon">Uber<br>Eats</div>
        <div class="uber-banner-title">Cake & Waffle</div>
        <div class="uber-banner-label">ケーキ・ワッフル</div>
      </a>
    </div>

    <div class="uber-banner-wrap">
      <a class="uber-banner" href="https://www.ubereats.com/store-browse-uuid/0f9441e6-1672-476f-945d-fc962ed9e1c3?diningMode=DELIVERY" target="_blank" rel="noopener">
        <div class="uber-icon">Uber<br>Eats</div>
        <div class="uber-banner-title">Crepe</div>
        <div class="uber-banner-label">クレープ</div>
      </a>
    </div>

  </div>

</div>

<footer>© sugar</footer>

</body>
</html>
